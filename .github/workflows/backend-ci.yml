      # 5) Crear esquema y datos semilla para los tests.
      - name: Initialize database schema and seed data
        run: mysql -h 127.0.0.1 -u root -proot AlertDog < db/init.sql

      # 6) Levantar la API en segundo plano.
      - name: Start backend
        run: |
          npm run start > server.log 2>&1 &
          echo $! > server.pid

      # 7) Esperar a que la API responda antes de ejecutar pruebas.
      - name: Wait for backend health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/ > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          echo "Backend did not start in time"
          cat server.log
          exit 1

      # 8) Smoke tests básicos de disponibilidad y reglas mínimas.
      - name: Run API smoke tests
        run: npm run test:api

      # 8.1) Tests unitarios de funciones puras del dominio.
      - name: Run backend unit tests
        run: npm run test:unit

      # 9) Tests de CRUD de usuarios.
      - name: Run user CRUD tests
        run: npm run test:api:usuarios

      # 10) Tests de flujo integrado usuario -> perro -> cita.
      - name: Run user-dog-cita flow tests
        run: npm run test:api:flujo

      # Si algo falla, se imprimen logs para diagnóstico.
      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "===== server.log ====="
          cat server.log

      # Limpieza del proceso backend para no dejar jobs colgados.
      - name: Stop backend
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi
