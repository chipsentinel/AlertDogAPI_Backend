name: Backend CI

on:
  # Permite ejecutar el pipeline manualmente desde la pestaña Actions.
  workflow_dispatch:

  # Se ejecuta automáticamente al hacer push en ramas de trabajo.
  push:
    branches:
      - main
      - dev
      - "feature/**"

  # Se ejecuta también en PR para validar antes de mergear.
  pull_request:
    branches:
      - main
      - dev

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      # MariaDB temporal para pruebas de integración reales en CI.
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: AlertDog
          MARIADB_USER: admin
          MARIADB_PASSWORD: "1234"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u root -proot"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=20

    steps:
      # 1) Descargar código del repositorio.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instalar PowerShell para ejecutar scripts .ps1 en runners Linux.
      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https software-properties-common
          wget -q https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell
          pwsh --version
      # 2) Configurar Node.js con caché de npm para acelerar el pipeline.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3) Instalar dependencias exactas definidas en package-lock.json.
      - name: Install dependencies
        run: npm ci

      # 4) Esperar a que MariaDB esté disponible antes de iniciar pruebas.
      - name: Wait for MariaDB to be ready
        run: |
          for i in {1..30}; do
