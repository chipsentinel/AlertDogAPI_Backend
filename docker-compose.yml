services:
  db:
    image: mariadb:11
    container_name: alertdog_db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: AlertDog
      MARIADB_USER: admin
      MARIADB_PASSWORD: "1234"
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alertdog_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: "1234"
      DB_NAME: AlertDog
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  mariadb_data:
